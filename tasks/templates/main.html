{% load static %}
<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Task Tracker</title>

        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </head>
    <body>
        <h1>Task list</h1>

        <div id="task-list">
            {% for task in task_list %}
                <div id="task-{{ task.id }}">
                    <p>{{ task.task_name }}</p>

                    <form method="POST" class="js-delete-task-form" data-delete-task="{% url 'main' %}">
                        {% csrf_token %}
                        <input type="hidden" class="js-task-id" value="{{ task.id }}">
                        <button type="submit">Delete</button>
                    </form>
                </div>
            {% endfor %}
        </div>  

        <h2>add task</h2>
        <form method="POST" id="js-create-task-form" data-create-task="{% url 'main' %}">
            {% csrf_token %}
            {{ form }}
            <button type="submit">submit</button>
        </form>
        

    </body>
</html>
